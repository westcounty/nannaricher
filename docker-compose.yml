version: '3.8'

services:
  nannaricher:
    build: .
    container_name: nannaricher
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/socket.io/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
